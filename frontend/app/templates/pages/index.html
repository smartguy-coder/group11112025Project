{% extends "base.html" %}

{% block content %}


<div class="container-fluid row row-cols-1 row-cols-md-4 g-4">

{% for product in products %}
<div class="card" style="width: 18rem;">
  <img src="{{ product.main_image }}" class="card-img-top" alt="..." width="50px">
  <div class="card-body">
    <h5 class="card-title">{{ product.title }}</h5>
    <p class="card-text">{{ product.description|truncate(30, true) }}</p>
    <p class="card-text">{{ product.price}} грн</p>
    <a href="{{ url_for('product_detail', product_uuid=product.uuid_id) }}" class="btn btn-primary">Details</a>
  </div>
</div>
{% endfor %}


</div>
{% endblock %}
